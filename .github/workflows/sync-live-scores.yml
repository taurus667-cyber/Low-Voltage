name: Sync live scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call live score sync endpoint
        env:
          LIVE_SYNC_URL: ${{ secrets.LIVE_SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$LIVE_SYNC_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${LIVE_SYNC_URL}/api/sync-live-scores"
